version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pulse_db
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse_user
      POSTGRES_PASSWORD: pulse_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse_user -d pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pulse_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pulse_user:pulse_secret@db:5432/puls
      SECRET_KEY: change_this_in_production_please
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: